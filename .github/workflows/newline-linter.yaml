# Make sure that all text files end with a newline character.
# Configure your editor to end every file with a newline character.
# See <https://stackoverflow.com/a/729795>
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  linelint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check trailing newlines
        run: |
          FAILED=0
          while IFS= read -r file; do
            if [[ -f "$file" ]] && [[ -s "$file" ]] && [[ -n "$(tail -c1 "$file")" ]]; then
              echo "::error file=$file::File does not end with a newline"
              FAILED=1
            fi
          done < <(git ls-files)
          exit $FAILED
